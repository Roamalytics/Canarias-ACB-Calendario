name: Update Canarias Basketball Calendar

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 06:00 UTC
  workflow_dispatch:       # allow manual runs

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run updater script
        run: python update_calendar.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add canarias-basketball-acb-calendar.ics
          git commit -m "Auto-update calendar" || echo "No changes to commit"
          git push
